<!-- REGISTER -->

<section class="register-section">

<div class="shape-green"></div>
<div class="shape-yellow"></div>
<div class="shape-red"></div>

<div class="container">

<div class="row align-items-center g-5">

<!-- IMAGE -->

<div class="col-lg-6">

<div class="register-image">

<img
src="images/register-illustration.png"
class="img-fluid"
alt="Inscription EducFlash">

</div>

</div>

<!-- FORMULAIRE -->

<div class="col-lg-6">

<div class="register-card">

<span class="register-badge">

INSCRIPTION

</span>

<h1>

Créer votre

<span>compte EducFlash</span>

</h1>

<p>

Rejoignez notre plateforme éducative
et accédez à des milliers de ressources pédagogiques.

</p>

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label>Nom</label>

<input
type="text"
class="form-control"
placeholder="Votre nom">

</div>

<div class="col-md-6 mb-3">

<label>Prénom</label>

<input
type="text"
class="form-control"
placeholder="Votre prénom">

</div>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
placeholder="nom@email.com">

</div>

<div class="mb-3">

<label>Téléphone</label>

<input
type="tel"
class="form-control"
placeholder="+229 XX XX XX XX">

</div>

<div class="mb-3">

<label>Catégorie</label>

<select class="form-select">

<option>Choisir une catégorie</option>

<option>Élève</option>

<option>Étudiant</option>

<option>Enseignant</option>

<option>Directeur</option>

<option>Parent d'élève</option>

<option>Autre</option>

</select>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label>Mot de passe</label>

<input
type="password"
class="form-control"
placeholder="Mot de passe">

</div>

<div class="col-md-6 mb-3">

<label>Confirmer</label>

<input
type="password"
class="form-control"
placeholder="Confirmation">

</div>

</div>

<div class="form-check mb-4">

<input
class="form-check-input"
type="checkbox"
id="conditions">

<label
class="form-check-label"
for="conditions">

J'accepte les conditions d'utilisation

</label>

</div>

<button
type="submit"
class="btn-register">

<i class="bi bi-person-plus-fill"></i>

Créer mon compte

</button>

</form>

<div class="login-link">

Déjà inscrit ?

<a href="se_connecter.html">

Se connecter

</a>

</div>

</div>

</div>

</div>

</div>
